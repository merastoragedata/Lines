<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>400 kV Karjat — Grid Portal</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>

<!-- React (CDN, no build step needed) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Leaflet (open-source maps, no API key required) -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Export-to-PDF -->
<script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<!-- App data (plain JS, no JSX) -->
<script src="data.js"></script>

<!-- App code (JSX transformed in-browser by Babel) -->
<script type="text/babel" data-presets="react" src="weather.js"></script>
<script type="text/babel" data-presets="react" src="mapEngine.js"></script>
<script type="text/babel" data-presets="react" src="pages.js"></script>
<script type="text/babel" data-presets="react" src="app.js"></script>
</body>
</html>
